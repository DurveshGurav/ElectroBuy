<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Electrobuy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <header>
        <a href="index.html" class="logo">Electro<span>buy</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="index.html#products">Products</a>
            <a href="index.html#contact">Contact</a>
            <a href="about.html">About</a>
            <a href="login.html">Login</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <main class="login-main">
        <div class="login-container">
            <h2>Student Login</h2>
            <form>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="student@university.edu" required>
                </div>
                <div class="form-group">
                    <label for="student-id">Student ID <span class="optional">(Optional)</span></label>
                    <input type="text" id="student-id" placeholder="e.g. UNI2024001">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                </div>
                <button type="submit">Sign In</button>
            </form>
            <div class="extra-links">
                <p>Forgot password? <a href="#">Reset Here</a></p>
                <p style="margin-top:10px;">New student? <a href="#">Register Account</a></p>
            </div>
        </div>
    </main>

    <footer>
        <a href="index.html" class="logo">Electro<span>buy</span></a>
        <p>© 2024 Electrobuy. All rights reserved.</p>
    </footer>
</body>
</html>
